# ym_coupled config file — key=value format, # comments, blank lines ignored.
# All keys are optional except k_mode and alpha_YM.
# Run: ./ym_coupled this_file.ini

# ── Required ──────────────────────────────────────────────────────────────────
k_mode          = 1          # integer z-mode; kz_physical = k_mode * 2π / Lz
alpha_YM        = 2.0        # SU(2) colour coupling

# ── Physics ───────────────────────────────────────────────────────────────────
perturb_amp     = 0.001
run_mode        = 6          # 6=NAB_CIRC_AZ2 (active); see CLAUDE.md
V0              = 0.05       # shear velocity
xi_sponge       = 13.0       # |ξ| where sponge starts (0 = disabled)
sigma_sponge    = 5.0
# freeze_override = -1       # -1 = use run_mode default
suppress_kz0    = 1
hyp_diff        = 5e-5
kz_suppress_max = 0          # suppress kz=1..k_mode-1 (set to k_mode-1)
eps_override    = 0.15       # shear half-width in physical units (-1 = Lx/6)
kz_suppress_hi  = 14         # bandpass upper edge (suppress kz > k_mode up to this)

# ── Grid / timestep ───────────────────────────────────────────────────────────
nz_override     = 128        # -1 = default 64; scale with Lz to keep DZ≈0.098
# nx_override   = 768        # -1 = default 768
# courant_override = 0.1     # -1 = default 0.1
lz_override     = 12.5664    # 4π — set nz_override=128 to match; -1 = default 2π
# lx_override   = -1         # -1 = default 6π

# ── Run control ───────────────────────────────────────────────────────────────
target_tu       = 100
# run_tag       =            # appended to output directory name
seed_profile_file = eigenmode_seed_kz1_a2.00_V0.050_sp13.0_lz12.5664.bin
